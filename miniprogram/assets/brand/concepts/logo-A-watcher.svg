<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>myally Logo - 守望者 (The Watcher)</title>
  <defs>
    <linearGradient id="watcherBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6FD9B5"/>
      <stop offset="1" stop-color="#1A8B72"/>
    </linearGradient>
    <linearGradient id="watcherShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A8B72" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#1A8B72" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="watcherPupil" cx="0.4" cy="0.4">
      <stop offset="0" stop-color="#2A5A4D"/>
      <stop offset="1" stop-color="#0F2E26"/>
    </radialGradient>
  </defs>

  <!-- Soft shadow under the form -->
  <ellipse cx="256" cy="430" rx="150" ry="14" fill="url(#watcherShadow)"/>

  <!-- Eye + speech bubble fusion shape -->
  <path d="M 96 256
           C 96 158, 168 92, 256 92
           C 344 92, 416 158, 416 256
           C 416 314, 380 354, 332 374
           L 348 432
           C 350 444, 338 452, 328 444
           L 268 402
           C 264 400, 260 398, 256 398
           C 160 396, 96 354, 96 256 Z"
        fill="url(#watcherBody)"/>

  <!-- Pupil / inner eye -->
  <circle cx="256" cy="240" r="44" fill="url(#watcherPupil)"/>
  <!-- Highlight on pupil -->
  <circle cx="240" cy="222" r="12" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="270" cy="252" r="5" fill="#FFFFFF" opacity="0.5"/>

  <!-- Subtle leaf vein down the center of the eye -->
  <path d="M 256 196 Q 254 240 256 284" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.25" stroke-linecap="round"/>
</svg>
